<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="vertical-menu">
    <a href="index.html" class="active">Strona główna</a>
    <a href="products.html">Produkty</a>
    <a href="stats.html">Statystyki</a>
</div>

<main class="container">
    <h1>Lista produktów</h1>

    <div class="form-section">
        <h2>Dodaj nowy produkt</h2>
        <form id="product-form">
            <div class="form-group">
                <label for="name">Nazwa produktu:</label>
                <input type="text" id="name" name="name">
            </div>
            <div class="form-group">
                <label for="price">Cena (PLN):</label>
                <input type="number" id="price" name="price" step="0.01" required placeholder="np. 1999.99">
            </div>
            <button type="submit" class="btn">Dodaj produkt</button>
        </form>
        <div id="form-message"></div>
    </div>

    <div class="list-section">
        <h2>Aktualna lista</h2>
        <div id="products-list">
            <p>Ładowanie...</p>
        </div>
    </div>
</main>

<script src="js/products.js"></script>
</body>
</html>
